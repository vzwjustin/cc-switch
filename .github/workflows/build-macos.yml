name: Build macOS App

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-macos:
    runs-on: macos-14
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.3
          run_install: false

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build universal macOS app
        run: pnpm tauri build --target universal-apple-darwin

      - name: Collect bundles
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          find src-tauri/target -path '*/bundle/macos/*' \( -name '*.dmg' -o -name '*.zip' \) -exec cp {} release-assets/ \;
          APP_PATH=$(find src-tauri/target -path '*/bundle/macos/*.app' -maxdepth 1 -type d | head -1 || true)
          if [ -n "$APP_PATH" ]; then
            ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "release-assets/$(basename "$APP_PATH").zip"
          fi
          ls -laR release-assets

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cc-switch-macos-universal
          path: release-assets/*
          if-no-files-found: error
